{% extends "base.html" %}
{% set title = "Editar paciente" if patient else "Novo paciente" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h4 class="mb-0">{{ "Editar paciente" if patient else "Novo paciente" }}</h4>
    <div class="text-muted small">Cadastro completo para atendimento, financeiro e WhatsApp.</div>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('patients.list_patients') }}">Voltar</a>
</div>

<form method="post" class="card shadow-sm border-0">
  <div class="card-body p-4">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Nome completo *</label>
        <input class="form-control" name="name" value="{{ patient.name if patient else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Telefone / WhatsApp</label>
        <input class="form-control" name="phone" value="{{ patient.phone if patient else '' }}" placeholder="(00) 00000-0000">
      </div>
      <div class="col-md-3">
        <label class="form-label">Nascimento</label>
        <input class="form-control" type="date" name="birth_date" value="{{ patient.birth_date if patient else '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">CPF</label>
        <input class="form-control" name="cpf" value="{{ patient.cpf if patient and patient.cpf is defined else '' }}" placeholder="000.000.000-00">
      </div>
      <div class="col-md-4">
        <label class="form-label">E-mail</label>
        <input class="form-control" name="email" value="{{ patient.email if patient and patient.email is defined else '' }}" placeholder="paciente@email.com">
      </div>
      <div class="col-md-4">
        <label class="form-label">Endereço</label>
        <input class="form-control" name="address" value="{{ patient.address if patient and patient.address is defined else '' }}" placeholder="Rua, número, bairro">
      </div>
      <div class="col-12">
        <label class="form-label">Observações internas</label>
        <textarea class="form-control" name="notes" rows="4" placeholder="Alergias, preferências de horário, observações da recepção...">{{ patient.notes if patient else '' }}</textarea>
      </div>
    </div>
    <div class="d-flex justify-content-end gap-2 mt-4">
      <a class="btn btn-outline-secondary" href="{{ url_for('patients.list_patients') }}">Cancelar</a>
      <button class="btn btn-brand">Salvar paciente</button>
    </div>
  </div>
</form>
{% endblock %}
