services:
  eduarda-clinica:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_PATH: ${DB_PATH:-/data/eduarda_imbelloni.db}
      CLINIC_NAME: ${CLINIC_NAME:-Eduarda Imbelloni Clínica Especializada}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      FINANCE_PASSWORD: ${FINANCE_PASSWORD:-eduarda2026}
    volumes:
      - eduarda-data:/data
    expose:
      - "8000"

volumes:
  eduarda-data:
