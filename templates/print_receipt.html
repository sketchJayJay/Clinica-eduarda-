<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><title>Recibo</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><style>body{background:white}.receipt{max-width:760px;margin:30px auto;padding:35px;border:1px solid #eadfd7;border-radius:22px}.top{text-align:center}.top img{max-width:260px;border-radius:18px}.line{display:flex;justify-content:space-between;border-bottom:1px dashed #d8c9be;padding:12px 0}.total{font-size:28px;font-weight:800;color:#9a5d45}.sign{margin-top:70px;text-align:center;border-top:1px solid #8c766a;padding-top:10px}</style></head><body><div class="receipt"><div class="top"><img src="{{ url_for('static', filename='logo.jpeg') }}"><h1>Recibo</h1><p>{{clinic_name}} - {{clinic_subtitle}}</p></div>{% if f %}<div class="line"><b>Paciente</b><span>{{f.patient or '-'}}</span></div><div class="line"><b>Descrição</b><span>{{f.description}}</span></div><div class="line"><b>Vencimento</b><span>{{f.due_date or '-'}}</span></div><div class="line"><b>Status</b><span>{{f.status}}</span></div><div class="line total"><b>Total</b><span>R$ {{'%.2f'|format(f.amount)}}</span></div>{% endif %}<p class="sign">Assinatura / Responsável</p><button onclick="window.print()" class="no-print">Imprimir</button></div></body></html>
