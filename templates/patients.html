{% extends 'base.html' %}{% block title %}Pacientes{% endblock %}{% block subtitle %}Cadastro e busca rápida de pacientes.{% endblock %}{% block content %}<div class="grid"><section class="panel"><h2>Novo paciente</h2><form method="post" class="form"><input name="name" placeholder="Nome completo" required><input name="phone" placeholder="WhatsApp"><input name="cpf" placeholder="CPF"><input name="birthdate" type="date"><input name="address" placeholder="Endereço"><textarea name="notes" placeholder="Observações"></textarea><button>Salvar paciente</button></form></section><section class="panel"><form class="form no-print" method="get"><input name="q" value="{{q}}" placeholder="Buscar por nome, telefone ou CPF"></form><table><tr><th>Nome</th><th>Telefone</th><th>Ações</th></tr>{% for p in patients %}<tr><td>{{p.name}}</td><td>{{p.phone or '-'}}</td><td><a class="btn mini" href="/patients/{{p.id}}">Abrir</a> <button class="mini ghost" onclick="zap('{{p.phone}}','Olá {{p.name}}, tudo bem?')">WhatsApp</button></td></tr>{% endfor %}</table></section></div>{% endblock %}
